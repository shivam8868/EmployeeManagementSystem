<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            animation: fadeIn 0.8s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .navbar {
            background: linear-gradient(135deg, #2c3e50, #3498db) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: slideDown 0.6s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
            animation: slideUp 0.6s ease;
            overflow: hidden;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .card-header h4 {
            margin: 0;
            font-weight: 700;
        }
        
        .card-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: #667eea;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }
        
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        
        .form-control.is-valid {
            border-color: #28a745;
        }
        
        .invalid-feedback {
            font-size: 12px;
            margin-top: 5px;
        }
        
        .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-update:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-update:disabled {
            opacity: 0.6;
            transform: none;
        }
        
        .btn-cancel {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        .employee-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .card-body {
                padding: 25px;
            }
        }
    </style>
    
    <title>Edit Employee | EMS</title>
</head>
<body>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-users me-2"></i>EMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/addemp">
                        <i class="fas fa-user-plus"></i> Add Employee
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- Navbar End -->

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-edit me-2"></i>Edit Employee</h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-3">
                        <span class="employee-badge">
                            <i class="fas fa-id-card"></i> Employee ID: <span th:text="${emp.id}"></span>
                        </span>
                    </div>
                    
                    <form th:action="@{/update}" method="post" th:object="${emp}" id="employeeForm" onsubmit="return validateForm()">
                        
                        <input type="hidden" th:value="${emp.id}" name="id">
                        
                        <div class="form-group">
                            <label><i class="fas fa-user"></i>Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name" id="name" 
                                   th:value="${emp.name}" placeholder="Enter full name" required>
                            <div class="invalid-feedback" id="nameError">Please enter a valid name</div>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-location-dot"></i>Address</label>
                            <input type="text" class="form-control" name="address" id="address" 
                                   th:value="${emp.address}" placeholder="Enter address">
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i>Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" name="email" id="email" 
                                   th:value="${emp.email}" placeholder="Enter email address" required>
                            <div class="invalid-feedback" id="emailError">Please enter a valid email</div>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i>Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" name="phno" id="phno" 
                                   th:value="${emp.phno}" placeholder="Enter 10-digit mobile number" required maxlength="10">
                            <div class="invalid-feedback" id="phoneError">Please enter a valid 10-digit phone number</div>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-rupee-sign"></i>Salary</label>
                            <input type="number" class="form-control" name="salary" id="salary" 
                                   th:value="${emp.salary}" placeholder="Enter salary amount" step="1000">
                            <div class="invalid-feedback" id="salaryError">Salary must be greater than 0</div>
                        </div>
                        
                        <button type="submit" class="btn-update" id="updateBtn">
                            <i class="fas fa-save"></i> Update Employee
                        </button>
                        <button type="button" class="btn-cancel" onclick="cancelEdit()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                        
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    // Real-time validation
    document.getElementById('name').addEventListener('blur', function() {
        if(this.value.trim() === '') {
            this.classList.add('is-invalid');
            document.getElementById('nameError').style.display = 'block';
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
            document.getElementById('nameError').style.display = 'none';
        }
    });
    
    document.getElementById('email').addEventListener('blur', function() {
        let email = this.value;
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(email === '' || !emailRegex.test(email)) {
            this.classList.add('is-invalid');
            document.getElementById('emailError').style.display = 'block';
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
            document.getElementById('emailError').style.display = 'none';
        }
    });
    
    document.getElementById('phno').addEventListener('blur', function() {
        let phone = this.value;
        let phoneRegex = /^[0-9]{10}$/;
        if(phone === '' || !phoneRegex.test(phone)) {
            this.classList.add('is-invalid');
            document.getElementById('phoneError').style.display = 'block';
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
            document.getElementById('phoneError').style.display = 'none';
        }
    });
    
    document.getElementById('salary').addEventListener('blur', function() {
        let salary = parseFloat(this.value);
        if(this.value !== '' && (isNaN(salary) || salary <= 0)) {
            this.classList.add('is-invalid');
            document.getElementById('salaryError').style.display = 'block';
        } else {
            this.classList.remove('is-invalid');
            if(this.value !== '') {
                this.classList.add('is-valid');
            }
            document.getElementById('salaryError').style.display = 'none';
        }
    });
    
    function validateForm() {
        let isValid = true;
        
        let name = document.getElementById('name').value.trim();
        if(name === '') {
            document.getElementById('name').classList.add('is-invalid');
            isValid = false;
        }
        
        let email = document.getElementById('email').value;
        let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(email === '' || !emailRegex.test(email)) {
            document.getElementById('email').classList.add('is-invalid');
            isValid = false;
        }
        
        let phone = document.getElementById('phno').value;
        let phoneRegex = /^[0-9]{10}$/;
        if(phone === '' || !phoneRegex.test(phone)) {
            document.getElementById('phno').classList.add('is-invalid');
            isValid = false;
        }
        
        if(isValid) {
            let btn = document.getElementById('updateBtn');
            btn.innerHTML = '<span class="loader"></span> Updating...';
            btn.disabled = true;
            return true;
        }
        
        return false;
    }
    
    function cancelEdit() {
        if(confirm('Are you sure you want to cancel? Any changes will be lost.')) {
            window.location.href = '/';
        }
    }
    
    // Initialize validation classes
    $(document).ready(function() {
        // Mark fields as valid if they have values
        if(document.getElementById('name').value.trim() !== '') {
            document.getElementById('name').classList.add('is-valid');
        }
        if(document.getElementById('email').value.trim() !== '') {
            document.getElementById('email').classList.add('is-valid');
        }
        if(document.getElementById('phno').value.trim() !== '') {
            document.getElementById('phno').classList.add('is-valid');
        }
        if(document.getElementById('salary').value.trim() !== '') {
            document.getElementById('salary').classList.add('is-valid');
        }
        
        // Show toast message if any
        var msg = '<span th:if="${session.msg}" th:text="${session.msg}"></span>';
        if(msg && msg.trim() !== '' && msg.trim() !== 'null') {
            showToast(msg);
        }
    });
    
    function showToast(message) {
        let toastHtml = `
            <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>
        `;
        $('body').append(toastHtml);
        setTimeout(() => {
            $('.alert').alert('close');
        }, 3000);
    }
</script>

</body>
</html>
